<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Dungeon Browser — verification harness</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Test-only page: stages scenes for headless screenshots.
       Scenes: #combat #inv #death #town #trade #board #fireball #save (then load without hash to see resume). -->
  <canvas id="game"></canvas>
  <script>
    window.__errors = [];
    window.onerror = function (msg, src, line, col) {
      window.__errors.push(`${msg} @ ${src}:${line}:${col}`);
      document.title = 'ERR: ' + window.__errors.join(' | ');
    };
  </script>
  <script src="js/util.js"></script>
  <script src="js/balance.js"></script>
  <script src="js/save.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/skills.js"></script>
  <script src="js/items.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/quests.js"></script>
  <script src="js/dungeon.js"></script>
  <script src="js/game/core.js"></script>
  <script src="js/game/state.js"></script>
  <script src="js/game/combat.js"></script>
  <script src="js/game/ai.js"></script>
  <script src="js/game/inventory.js"></script>
  <script src="js/game/town.js"></script>
  <script src="js/game/update.js"></script>
  <script src="js/render/core.js"></script>
  <script src="js/render/tiles.js"></script>
  <script src="js/render/icons.js"></script>
  <script src="js/render/fixtures.js"></script>
  <script src="js/render/monster.js"></script>
  <script src="js/render/player.js"></script>
  <script src="js/render/draw.js"></script>
  <script src="js/ui/core.js"></script>
  <script src="js/ui/input.js"></script>
  <script src="js/ui/orbs.js"></script>
  <script src="js/ui/hud.js"></script>
  <script src="js/ui/panels.js"></script>
  <script src="js/ui/tooltip.js"></script>
  <script src="js/ui/creation.js"></script>
  <script src="js/ui/draw.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      const mode = location.hash.slice(1) || 'combat';
      const TS = 32;

      // Advance the shared game state synchronously — headless virtual time only
      // pumps a handful of rAF frames, so scenes are staged by driving updates here.
      function pump(frames, keys, pressedOnce) {
        let s = window.__state();
        const input = {
          keys: Object.assign({ w: false, a: false, s: false, d: false, space: false }, keys || {}),
          pressed: new Set(pressedOnce || []),
          mouse: { x: -1, y: -1, click: false, rclick: false },
        };
        for (let i = 0; i < frames; i++) {
          s = window.__mods.Game.update(s, input, 1 / 60);
          input.pressed.clear();
        }
        return s;
      }

      function enterTown(s) {
        s.monsters.length = 0;
        pump(1, {}, ['portal']);
        const portal = s.portals[0];
        s.player.x = portal.x;
        s.player.y = portal.y;
        pump(45);
        return s;
      }

      // Aim the cursor using the game's own view size (headless viewports lie).
      function aim(clientX, clientY) {
        document.getElementById('game').dispatchEvent(
          new MouseEvent('mousemove', { clientX, clientY })
        );
      }

      setTimeout(() => {
        // Fresh profiles boot into character creation — dismiss it for every scene but #create.
        if (mode !== 'create' && window.__creation && window.__creation()) {
          window.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter' }));
        }
        const s = window.__state();
        const M = window.__mods;
        const I = M.Items;
        const rng = M.U.mulberry32(7);

        if (mode === 'combat') {
          const sp = s.dungeon.spawns[0];
          s.player.x = (sp.x + 0.5) * TS + 40;
          s.player.y = (sp.y + 0.5) * TS;
          s.cam.x = s.player.x;
          s.cam.y = s.player.y;
          s.player.facing = Math.PI;
          for (const m of s.monsters) {
            if (Math.hypot(m.x - s.player.x, m.y - s.player.y) < 300) m.aggroed = true;
          }
          s.groundItems.push({ kind: 'item', item: I.makeItem(3, rng, { slot: 'weapon', rarity: 'rare' }), x: s.player.x - 60, y: s.player.y + 48 });
          s.groundItems.push({ kind: 'gold', amount: 18, x: s.player.x - 24, y: s.player.y + 72 });
          pump(20, { space: true });
        } else if (mode === 'inv') {
          I.addItem(s.bag, I.makeItem(5, rng, { slot: 'weapon', rarity: 'unique' }));
          I.addItem(s.bag, I.makeItem(4, rng, { slot: 'helmet', rarity: 'rare' }));
          I.addItem(s.bag, I.makeItem(3, rng, { slot: 'boots', rarity: 'magic' }));
          I.addItem(s.bag, I.makeItem(3, rng, { slot: 'gloves', rarity: 'rare' }));
          I.addItem(s.bag, I.makePotion(2, rng));
          for (let k = 0; k < 3; k++) s.bag.potions.health.push(I.makePotion(2, rng, 'health'));
          s.bag.potions.mana.push(I.makePotion(2, rng, 'mana'));
          for (const slot of ['helmet', 'armor', 'gloves', 'pants', 'boots']) {
            s.player.equip[slot] = I.makeItem(4, rng, { slot, rarity: 'magic' });
          }
          s.invOpen = true;
          const hover = () => {
            const v = window.__view;
            aim((v.w - 660) / 2 + 200 + 26, (v.h - 440) / 2 - 14 + 84 + 26);
          };
          hover();
          requestAnimationFrame(function probe() {
            hover();
            requestAnimationFrame(probe);
          });
        } else if (mode === 'death') {
          s.player.hp = 0;
        } else if (mode === 'town') {
          enterTown(s);
          // Stand in the middle of camp for the postcard shot.
          const d = window.__state().dungeon;
          s.player.x = ((d.well.x + d.vendor.x) / 2 + 0.5) * TS;
          s.player.y = (d.well.y + 0.5) * TS + 30;
          s.cam.x = s.player.x;
          s.cam.y = s.player.y;
          pump(6);
        } else if (mode === 'trade') {
          enterTown(s);
          const d = window.__state().dungeon;
          s.player.x = (d.vendor.x + 0.5) * TS - 40;
          s.player.y = (d.vendor.y + 0.5) * TS;
          s.cam.x = s.player.x;
          s.cam.y = s.player.y;
          s.bag.gold = 350;
          I.addItem(s.bag, I.makeItem(2, rng, { slot: 'weapon', rarity: 'rare' }));
          const soldItem = I.makeItem(3, rng, { slot: 'helmet', rarity: 'magic' });
          I.addItem(s.bag, soldItem);
          pump(3);
          M.Game.sellFromBag(s, s.bag.slots.indexOf(soldItem)); // stock the buy-back shelf
          s.invOpen = true;
          const hoverShop = () => {
            const v = window.__view;
            aim((v.w - 660) / 2 + 24 + 26, (v.h - 440) / 2 - 14 - 108 + 32 + 26);
          };
          hoverShop();
          requestAnimationFrame(function probe() {
            hoverShop();
            requestAnimationFrame(probe);
          });
        } else if (mode === 'board') {
          enterTown(s);
          const d = window.__state().dungeon;
          s.player.x = (d.board.x + 0.5) * TS;
          s.player.y = (d.board.y + 0.5) * TS + 34;
          s.cam.x = s.player.x;
          s.cam.y = s.player.y;
          pump(3); // settle into questing range
          M.Game.acceptQuest(s, 0); // one on the charter, mid-progress
          const taken = s.quests[0];
          taken.count = Math.floor(taken.need / 2);
          M.Game.acceptQuest(s, 1);
          s.quests[1].count = s.quests[1].need; // and one ready to claim
          pump(1, {}, ['interact']);
        } else if (mode === 'fireball') {
          s.monsters.length = 0;
          for (const slot of ['helmet', 'armor', 'gloves', 'pants', 'boots']) {
            s.player.equip[slot] = I.makeItem(5, rng, { slot, rarity: 'rare' });
          }
          s.player.equip.weapon = I.makeItem(3, rng, { slot: 'weapon', kind: 'wand' });
          for (let k = 0; k < 4; k++) {
            const m = { ...M.Entities.makeMonster(['zombie', 'brute', 'skeleton', 'bat'][k], 2, k === 0),
              x: s.player.x + 150 + k * 26, y: s.player.y + (k % 2 ? 24 : -20),
              attackT: 9, hitT: 0, lungeT: 0, wanderT: 9, wandA: NaN, aggroed: true, kbx: 0, kby: 0 };
            s.monsters.push(m);
          }
          s.player.facing = 0;
          s.cam.x = s.player.x;
          s.cam.y = s.player.y;
          pump(14, { space: true }); // fireball mid-flight + embers
        } else if (mode === 'tree') {
          const Sk = M.Skills;
          s.player.skillPoints = 4;
          s.player.skills = {};
          s.player.skillPoints += 3;
          Sk.learn(s.player, 'whirlwind');
          Sk.learn(s.player, 'whirlwind');
          Sk.learn(s.player, 'rage');
          s.treeOpen = true;
          const hoverCard = () => {
            const v = window.__view;
            aim((v.w - 700) / 2 + 24 + 224 + 30, (v.h - 480) / 2 - 8 + 92 + 30); // nova card
          };
          hoverCard();
          requestAnimationFrame(function probe() {
            hoverCard();
            requestAnimationFrame(probe);
          });
        } else if (mode === 'nova') {
          s.monsters.length = 0;
          const Sk = M.Skills;
          s.player.skillPoints = 5;
          Sk.learn(s.player, 'nova');
          Sk.learn(s.player, 'whirlwind');
          for (let k = 0; k < 5; k++) {
            const a = (k / 5) * Math.PI * 2;
            const m = { ...M.Entities.makeMonster('skeleton', 2, false),
              x: s.player.x + Math.cos(a) * 130, y: s.player.y + Math.sin(a) * 130,
              attackT: 9, hitT: 0, lungeT: 0, wanderT: 9, wandA: NaN, aggroed: true, kbx: 0, kby: 0 };
            s.monsters.push(m);
          }
          pump(1, {}, ['skill1']);
          pump(10); // ring mid-flight at ~45px out
        } else if (mode === 'bossfight') {
          // Ride the stairs to floor 2, then step into the arena mid-fight.
          s.player.x = (s.dungeon.stairs.x + 0.5) * TS;
          s.player.y = (s.dungeon.stairs.y + 0.5) * TS;
          pump(3);
          const s2 = window.__state();
          const r = s2.dungeon.boss.room;
          s2.player.x = (r.x + 1.5) * TS;
          s2.player.y = (r.y + r.h / 2 + 0.5) * TS;
          s2.cam.x = s2.player.x;
          s2.cam.y = s2.player.y;
          pump(100); // boss wakes and closes in; camera settles on the room center
          const boss = s2.monsters.find((m) => m.boss);
          if (boss) boss.hp = Math.round(boss.maxHP * 0.62);
          pump(3, { space: true });
        } else if (mode === 'create') {
          for (const ch of 'Borys') window.dispatchEvent(new KeyboardEvent('keydown', { key: ch }));
          window.dispatchEvent(new KeyboardEvent('keydown', { key: 'ArrowRight' }));
        } else if (mode === 'deep') {
          const data = {
            version: 1,
            runSeed: s.runSeed,
            floor: 12,
            kills: 0,
            time: 0,
            milestones: [5, 10],
            player: M.Save.snapshot(s).player,
            bag: s.bag,
          };
          window.__setState(M.Game.fromSave(data));
        } else if (mode === 'waypoints') {
          s.milestones = [5, 10];
          enterTown(s);
          const s2 = window.__state();
          const e = s2.dungeon.entry;
          s2.player.x = (e.x + 0.5) * TS;
          s2.player.y = (e.y - 2.5) * TS;
          s2.cam.x = s2.player.x;
          s2.cam.y = s2.player.y;
          pump(6);
        } else if (mode === 'smith') {
          enterTown(s);
          const d = window.__state().dungeon;
          s.player.x = (d.smith.x + 0.5) * TS + 24;
          s.player.y = (d.smith.y + 0.5) * TS;
          s.cam.x = s.player.x;
          s.cam.y = s.player.y;
          s.bag.gold = 500;
          s.player.equip.weapon.plus = 2;
          pump(3);
          s.invOpen = true;
          const hoverWeapon = () => {
            const v = window.__view;
            aim((v.w - 660) / 2 + 28 + 76 + 28, (v.h - 440) / 2 - 14 + 60 + 28); // equipped weapon slot
          };
          hoverWeapon();
          requestAnimationFrame(function probe() {
            hoverWeapon();
            requestAnimationFrame(probe);
          });
        } else if (mode === 'save') {
          // Stage a mid-run character and persist it; a later plain load must resume it.
          s.floor = 3;
          s.player.level = 5;
          s.player.baseMaxHP = 156;
          s.player.baseDamage = 8;
          s.player.hp = 120;
          s.bag.gold = 777;
          I.addItem(s.bag, I.makeItem(3, rng, { slot: 'weapon', rarity: 'unique' }));
          M.Save.write(s);
          document.title = 'SAVED floor=' + s.floor + ' level=' + s.player.level;
        }
      }, 1500);
    })();
  </script>
</body>
</html>
